<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BACBRU — Gerador</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:#0D1B2A;display:flex;flex-direction:column;
  align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:2rem 1rem}
body::before{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 80% 40% at 50% -5%,rgba(201,168,76,.07),transparent);pointer-events:none}
.wrap{width:100%;max-width:370px;z-index:1}
.top{text-align:center;margin-bottom:2rem}
.top img{width:96px;height:96px;border-radius:50%;border:2px solid rgba(201,168,76,.4);
  display:block;margin:0 auto .9rem}
.top h1{font-size:1.5rem;font-weight:200;letter-spacing:.28em;color:#C9A84C;text-transform:uppercase}
.top p{font-size:.62rem;color:#3D5060;letter-spacing:.2em;text-transform:uppercase;margin-top:.3rem}
.card{background:#112233;border:1px solid rgba(201,168,76,.1);border-radius:18px;
  padding:1.8rem;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:20%;right:20%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(201,168,76,.4),transparent)}
.f{margin-bottom:1.1rem}
.f label{display:block;font-size:.6rem;font-weight:600;letter-spacing:.18em;
  text-transform:uppercase;color:#3D5060;margin-bottom:.45rem}
.f input{width:100%;background:#081220;border:1px solid rgba(201,168,76,.12);
  border-radius:10px;padding:.75rem 1rem;color:#fff;font-size:.95rem;
  font-family:inherit;outline:none;transition:all .25s}
.f input:focus{border-color:rgba(201,168,76,.5);box-shadow:0 0 0 3px rgba(201,168,76,.06)}
.f input.hl{border-color:rgba(201,168,76,.3);color:#E8CC7A;font-weight:600}
.f input::placeholder{color:rgba(61,80,96,.45)}
.btn{width:100%;padding:1rem;background:linear-gradient(135deg,#A8842A,#E8CC7A,#A8842A);
  background-size:200%;border:none;border-radius:12px;color:#0D1B2A;
  font-size:.9rem;font-weight:700;font-family:inherit;letter-spacing:.1em;
  text-transform:uppercase;cursor:pointer;transition:all .4s;
  box-shadow:0 4px 24px rgba(201,168,76,.18);margin-top:.5rem}
.btn:hover{background-position:100%;box-shadow:0 6px 32px rgba(201,168,76,.3);transform:translateY(-1px)}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
#msg{margin-top:.9rem;padding:.65rem 1rem;border-radius:9px;font-size:.8rem;
  text-align:center;display:none;font-weight:500;line-height:1.5}
#msg.ok{display:block;background:rgba(46,204,113,.07);border:1px solid rgba(46,204,113,.18);color:#2ECC71}
#msg.err{display:block;background:rgba(231,76,60,.07);border:1px solid rgba(231,76,60,.18);color:#E74C3C}
#msg.ld{display:block;background:rgba(201,168,76,.05);border:1px solid rgba(201,168,76,.12);color:#C9A84C}
footer{margin-top:1.8rem;text-align:center;font-size:.65rem;color:#1D3040;letter-spacing:.05em}
footer a{color:rgba(201,168,76,.4);text-decoration:none}
</style>
</head>

function b64Dec(s){
  return decodeURIComponent(
    Array.prototype.map.call(atob(s),
      c=>'%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)
    ).join('')
  );
}

function gerar(){
  const nome=document.getElementById('nome').value.trim();
  const senha=document.getElementById('senha').value.trim();
  const msg=document.getElementById('msg'),btn=document.getElementById('btn');
  if(!nome){msg.className='err';msg.textContent='⚠  Preencha o nome do assinante';return}
  if(!senha){msg.className='err';msg.textContent='⚠  Defina uma senha';return}
  msg.className='ld';msg.textContent='Gerando...';btn.disabled=true;
  try{
    const enc=btoa(unescape(encodeURIComponent(senha)));
    const safe=nome.replace(/\/g,'\\').replace(/"/g,'\"');
    let html=b64Dec(TPL)
      .replaceAll('%%LOGO%%',LOGO)
      .replace('%%NOME%%',safe)
      .replace('%%SENHA%%',enc);
    const safe2=nome.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'');
    const fname='BACBRU_'+safe2+'.html';
    // Usa FileReader + dataURL — funciona no Android
    const blob=new Blob([html],{type:'text/html;charset=utf-8'});
    const reader=new FileReader();
    reader.onload=function(){
      const a=document.createElement('a');
      a.href=reader.result;
      a.download=fname;
      document.body.appendChild(a);
      a.click();
      setTimeout(()=>{document.body.removeChild(a);},1000);
    };
    reader.readAsDataURL(blob);
    msg.className='ok';
    msg.innerHTML='✅ <strong>'+fname+'</strong> gerado!<br>Senha: <strong>'+senha+'</strong><br><small style="color:#7A9BB5">Verifique seus Downloads!</small>';
  }catch(e){
    msg.className='err';msg.textContent='Erro: '+e.message;console.error(e);
  }finally{btn.disabled=false;}
}
</script>
</body>
</html>
