<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>BACBRU</title>
<style>
:root{
  --navy:#0D1B2A;--navy2:#0F1E2F;--navy3:#152638;
  --gold:#C9A84C;--gold2:#E8CC7A;--gold3:#FDE68A;
  --green:#2ECC71;--red:#E74C3C;--orange:#E67E22;
  --grey:#7A9BB5;--white:#fff;--r:14px;--r2:18px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--navy);color:var(--white);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden}

/* LOCK */
#lock{position:fixed;inset:0;background:var(--navy);display:flex;
  flex-direction:column;align-items:center;justify-content:center;padding:2rem;z-index:100}
#lock img{width:108px;height:108px;border-radius:50%;border:2px solid rgba(201,168,76,.4);
  margin-bottom:1.2rem;display:block}
#lock h1{font-size:2rem;font-weight:200;letter-spacing:.3em;color:var(--gold);
  text-transform:uppercase;margin-bottom:.3rem}
#lock .sub{font-size:.72rem;color:var(--grey);letter-spacing:.15em;margin-bottom:2.5rem}
#lock input{width:100%;max-width:280px;background:rgba(255,255,255,.04);
  border:1px solid rgba(201,168,76,.25);border-radius:var(--r);padding:.9rem 1.2rem;
  color:var(--white);font-size:1.1rem;text-align:center;outline:none;
  letter-spacing:.1em;margin-bottom:.8rem;transition:border .2s}
#lock input:focus{border-color:var(--gold)}
#lock .unlock-btn{width:100%;max-width:280px;padding:.9rem;background:var(--gold);
  border:none;border-radius:var(--r);color:var(--navy);font-size:.88rem;
  font-weight:700;letter-spacing:.12em;text-transform:uppercase;cursor:pointer}
#lock .err{color:var(--red);font-size:.78rem;margin-top:.6rem;min-height:1.2rem}

/* APP */
#app{display:none;height:100%;flex-direction:column}
#app.on{display:flex}

/* header */
.hdr{background:var(--navy2);border-bottom:1px solid rgba(201,168,76,.12);
  padding:.75rem 1rem;display:flex;align-items:center;gap:.7rem;flex-shrink:0}
.hdr img{width:34px;height:34px;border-radius:50%;border:1.5px solid rgba(201,168,76,.35)}
.hdr-info{flex:1}
.hdr-info h2{font-size:.82rem;font-weight:700;color:var(--gold);letter-spacing:.06em}
.hdr-info p{font-size:.62rem;color:var(--grey)}
.hdr a{font-size:.62rem;color:var(--gold);border:1px solid rgba(201,168,76,.25);
  border-radius:20px;padding:.28rem .65rem;text-decoration:none;white-space:nowrap}

/* content */
.content{flex:1;overflow-y:auto;padding:1rem;padding-bottom:5rem;
  -webkit-overflow-scrolling:touch}

/* bottom nav */
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--navy2);
  border-top:1px solid rgba(201,168,76,.1);display:flex;z-index:10;
  padding-bottom:env(safe-area-inset-bottom)}
.ntab{flex:1;display:flex;flex-direction:column;align-items:center;
  padding:.55rem .4rem;gap:.2rem;cursor:pointer;border:none;background:none;
  color:var(--grey);font-size:.55rem;letter-spacing:.06em;text-transform:uppercase;
  transition:color .2s;font-family:inherit}
.ntab.active{color:var(--gold)}
.ntab svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.8}

/* cards */
.card{background:var(--navy2);border:1px solid rgba(255,255,255,.05);
  border-radius:var(--r2);padding:1.1rem;margin-bottom:.9rem}
.card-ttl{font-size:.62rem;font-weight:700;letter-spacing:.14em;
  text-transform:uppercase;color:var(--gold);margin-bottom:.9rem}

/* banca input */
.banca-wrap{background:var(--navy3);border:1px solid rgba(201,168,76,.22);
  border-radius:var(--r);padding:.9rem 1rem;display:flex;align-items:center;gap:.8rem}
.banca-wrap label{font-size:.6rem;color:var(--grey);white-space:nowrap;
  letter-spacing:.08em;text-transform:uppercase}
.banca-wrap input{flex:1;background:none;border:none;color:var(--gold2);
  font-size:1.25rem;font-weight:700;text-align:right;outline:none;
  width:0;font-family:inherit}
.banca-hint{font-size:.62rem;color:var(--grey);margin-top:.45rem;
  text-align:right;font-style:italic}

/* profiles */
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:.55rem}
.ppill{border-radius:var(--r);padding:.8rem .9rem;cursor:pointer;
  border:1.5px solid transparent;transition:all .2s;user-select:none}
.ppill.sel{border-color:currentColor;box-shadow:0 0 12px rgba(0,0,0,.3)}
.ppill .pn{font-size:1rem;font-weight:700;margin-bottom:.15rem}
.ppill .ps{font-size:.62rem;opacity:.8;font-weight:500}
.ppill .pd{font-size:.58rem;opacity:.6;margin-top:.18rem;line-height:1.4}

/* aviso */
.aviso{background:rgba(20,6,6,.9);border:1px solid rgba(231,76,60,.25);
  border-radius:var(--r);padding:.7rem .9rem;margin-bottom:.9rem;
  font-size:.72rem;color:#d88880;line-height:1.55}

/* day cards */
.day-card{background:var(--navy3);border-radius:var(--r);padding:.75rem .9rem;
  margin-bottom:.38rem;cursor:pointer;transition:all .2s;
  border:1px solid rgba(255,255,255,.04);user-select:none}
.day-card.done{background:rgba(9,28,18,.8);border-color:rgba(46,204,113,.15)}
.day-card.done .dnum{color:var(--green)}
.dtop{display:flex;align-items:center;justify-content:space-between;margin-bottom:.38rem}
.dnum{font-size:.68rem;font-weight:700;color:var(--gold);letter-spacing:.06em}
.dok{font-size:.75rem}
.dgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:.25rem}
.di{font-size:.6rem;color:var(--grey)}
.di span{display:block;font-size:.74rem;font-weight:600;color:var(--white);margin-top:.1rem}
.di.lucro span{color:var(--green)}
.di.stop span{color:var(--red)}

/* week label */
.wlbl{font-size:.58rem;color:var(--grey);letter-spacing:.1em;
  text-transform:uppercase;margin:.7rem 0 .35rem;padding-left:.2rem}

/* totals */
.tbar{background:var(--navy3);border:1px solid rgba(201,168,76,.15);
  border-radius:var(--r);padding:.9rem;margin-top:.7rem;
  display:flex;justify-content:space-around}
.titem .tl{font-size:.58rem;color:var(--grey);letter-spacing:.08em;
  text-transform:uppercase;margin-bottom:.22rem;text-align:center}
.titem .tv{font-size:1rem;font-weight:700;color:var(--green);text-align:center}

/* session entries */
.ecard{background:var(--navy3);border-radius:var(--r);padding:.8rem .9rem;
  margin-bottom:.45rem;border:1px solid rgba(255,255,255,.04);transition:all .2s}
.ecard.won{background:rgba(9,28,18,.85);border-color:rgba(46,204,113,.2)}
.ecard.lost{background:rgba(28,9,9,.85);border-color:rgba(231,76,60,.2)}
.etop{display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem}
.enum{font-size:.68rem;font-weight:700;color:var(--gold);letter-spacing:.06em}
.ebtns{display:flex;gap:.4rem}
.ebtns button{padding:.32rem .65rem;border-radius:7px;border:1px solid transparent;
  font-size:.72rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.bg{background:rgba(46,204,113,.1);color:var(--green);border-color:rgba(46,204,113,.25)!important}
.bp{background:rgba(231,76,60,.1);color:var(--red);border-color:rgba(231,76,60,.25)!important}
.bg.sel,.ecard.won .bg{background:var(--green);color:#0a1a10}
.bp.sel,.ecard.lost .bp{background:var(--red);color:#fff}
.evals{display:flex;gap:.8rem}
.eval{font-size:.68rem;color:var(--grey)}
.eval span{color:var(--white);font-weight:600}

/* value cards (entrada/gale) */
.vcards{display:grid;grid-template-columns:1fr 1fr;gap:.55rem;margin-bottom:.9rem}
.vcard{background:var(--navy3);border-radius:var(--r);padding:.85rem;text-align:center;
  border:1px solid rgba(255,255,255,.04)}
.vcard .vl{font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;
  margin-bottom:.3rem;font-weight:600}
.vcard .vv{font-size:1.8rem;font-weight:700}

/* resumo grid */
.rgrid{display:grid;grid-template-columns:1fr 1fr;gap:.55rem;margin-top:.8rem}
.rcard{background:var(--navy3);border-radius:var(--r);padding:.8rem}
.rcard .rl{font-size:.58rem;color:var(--grey);letter-spacing:.08em;
  text-transform:uppercase;margin-bottom:.28rem}
.rcard .rv{font-size:1.15rem;font-weight:700}

/* encerrar btn */
.enc-btn{width:100%;padding:.85rem;border:none;border-radius:var(--r);
  font-size:.88rem;font-weight:700;font-family:inherit;cursor:pointer;
  margin-top:.8rem;letter-spacing:.06em;transition:all .2s}
.enc-btn.ready{background:linear-gradient(135deg,#1a8a4a,#2ECC71);color:#061a0d}
.enc-btn.empty{background:rgba(255,255,255,.04);color:var(--grey);
  border:1px solid rgba(255,255,255,.07)}
.clr-btn{width:100%;padding:.65rem;background:none;border:1px solid rgba(255,255,255,.06);
  border-radius:var(--r);color:var(--grey);font-size:.75rem;font-family:inherit;
  cursor:pointer;margin-top:.45rem}

/* history */
.hist-card{background:var(--navy3);border-radius:var(--r);padding:.75rem .9rem;
  margin-bottom:.4rem;display:flex;align-items:center;gap:.8rem;
  border:1px solid rgba(255,255,255,.04)}
.hist-date{font-size:.6rem;color:var(--grey);min-width:50px}
.hist-info{flex:1}
.hist-res{font-size:.85rem;font-weight:700}
.hist-det{font-size:.6rem;color:var(--grey);margin-top:.1rem}
.hist-banca{font-size:.7rem;color:var(--gold2);text-align:right}

/* utils */
.sep{height:1px;background:rgba(255,255,255,.05);margin:.7rem 0}
.pos{color:var(--green)} .neg{color:var(--red)} .gld{color:var(--gold2)}
</style>
</head>

<script>
const NOME = "Brunas";
const SENHA_ENC = "MTMwMjE4MDU=";

document.getElementById('lk-sub').textContent = 'Bem-vindo, ' + NOME;
document.getElementById('hdr-nm').textContent = NOME;
document.getElementById('pwd').addEventListener('keydown', e => { if(e.key==='Enter') unlock(); });

function unlock(){
  const v = document.getElementById('pwd').value;
  if(btoa(unescape(encodeURIComponent(v))) === SENHA_ENC){
    document.getElementById('lock').style.display='none';
    document.getElementById('app').classList.add('on');
    loadState(); S.tab='inicio'; render();
  } else {
    document.getElementById('lk-err').textContent = 'Senha incorreta';
    document.getElementById('pwd').value='';
    document.getElementById('pwd').focus();
  }
}

const PROFILES = [
  {n:6, live:2, label:'6 Entradas', sub:'2 por live', obs:'Melhor opção para gerenciamento', color:'#C9A84C'},
  {n:9, live:3, label:'9 Entradas', sub:'3 por live', obs:'Ponto de atenção', color:'#E67E22'},
  {n:12,live:4, label:'12 Entradas',sub:'4 por live', obs:'Apostador arrojado, risco maior', color:'#E74C3C'},
  {n:15,live:5, label:'15 Entradas',sub:'5 por live', obs:'Alto risco, não indicado', color:'#8E0000'},
];

const KEY = 'bacbru_' + NOME.toLowerCase().replace(/\s+/g,'_');
let S = {
  banca: 500,
  profile: 0,
  days: new Array(30).fill(false),
  session: new Array(15).fill(null),
  history: [],
  tab: 'inicio',
  diasReais: [],
  sessoesDoDia: [],
  bancaInicioDia: null
};

function saveState(){ try{ localStorage.setItem(KEY, JSON.stringify(S)); }catch(e){} }
function loadState(){ try{ const d=localStorage.getItem(KEY); if(d){ const p=JSON.parse(d); Object.assign(S,p); }}catch(e){} }

function ceil5(v){ return Math.ceil(v/5)*5; }
function fmtR(v){ const n=Math.abs(v); return 'R$ ' + (Number.isInteger(n)?n.toLocaleString('pt-BR'):n.toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.')); }
function fmtS(v){ const n=Math.abs(v); const s=Number.isInteger(n)?n.toLocaleString('pt-BR'):n.toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.'); return (v>=0?'+ ':'- ') + 'R$ ' + s; }

function calcDays(){
  const p=PROFILES[S.profile]; let b=S.banca; const days=[];
  for(let i=0;i<30;i++){
    const base=ceil5(b*0.05);
    const empate=ceil5(base*0.10);
    const entry=ceil5(base+empate);
    const galeBase=ceil5(base*2);
    const empateGale=ceil5(galeBase*0.10);
    const gale=ceil5(galeBase+empateGale);
    const stop=ceil5(b-(entry*p.n));
    const lucro=ceil5(entry*p.n);
    days.push({banca:b,entry,empate,gale,stop,lucro});
    b+=lucro;
  }
  return days;
}

function calcSessao(useCurrentBanca){
  const p=PROFILES[S.profile];
  // Usa banca travada para entradas normais, banca atual para extras após red
  if(!S.bancaSessao) S.bancaSessao=S.banca;
  const bancaRef=useCurrentBanca?S.banca:S.bancaSessao;
  const base=ceil5(bancaRef*0.05);
  const empate=ceil5(base*0.10);
  const entry=ceil5(base+empate);
  const galeBase=ceil5(base*2);
  const empateGale=ceil5(galeBase*0.10);
  const gale=ceil5(galeBase+empateGale);
  return {entry, empate, gale, empateGale, n:p.n};
}

function sessaoResult(){
  // Banca já foi atualizada em tempo real
  return S.banca - (S.bancaSessao||S.banca);
}

function selMult(i,m){
  if(!S.empateMult)S.empateMult={};
  S.empateMult[String(i)]=S.empateMult[String(i)]===m?null:m;
  saveState();render();
}
function selTipo(i,t){
  if(!S.empateTipo)S.empateTipo={};
  S.empateTipo[String(i)]=S.empateTipo[String(i)]===t?null:t;
  saveState();render();
}

function marcarG(i){
  if(S.session[i]==='G'){
    // Desfaz: remove o lucro guardado
    const lucroAnterior=(S.lucros||{})[String(i)]||0;
    S.banca=S.banca-lucroAnterior;
    if(S.lucros)delete S.lucros[String(i)];
    S.session[i]=null;
    saveState();render();return;
  }
  const isExtra=i>=(PROFILES[S.profile].n);
  const {entry,empate,gale,empateGale}=calcSessao(isExtra);
  const mult=(S.empateMult||{})[String(i)];
  const tipo=(S.empateTipo||{})[String(i)];
  let lucro=entry; // green normal ganha entrada inteira
  if(mult&&tipo){
    if(tipo==='Seco'){
      const inp=document.getElementById('empval-'+i);
      const valorJogado=inp?parseFloat(inp.value)||0:0;
      if(!valorJogado){alert('Digite o valor que jogou no empate!');return;}
      lucro=valorJogado*mult;
    }
    if(tipo==='Entrada') lucro=(entry-(entry*0.10))+(empate*mult);
    if(tipo==='Gale') lucro=(gale-(gale*0.10))+(empateGale*mult);
    if(!S.empateMult)S.empateMult={};
    if(!S.empateTipo)S.empateTipo={};
    delete S.empateMult[String(i)];
    delete S.empateTipo[String(i)];
  }
  S.session[i]='G';
  if(!S.lucros)S.lucros={};
  S.lucros[String(i)]=lucro;
  S.banca=Math.max(0,S.banca+lucro);
  saveState();render();
}
function marcarP(i){
  if(S.session[i]==='P'){
    // Desfaz: devolve a perda guardada
    const perdaAnterior=(S.lucros||{})[String(i)]||0;
    S.banca=S.banca-perdaAnterior;
    if(S.lucros)delete S.lucros[String(i)];
    S.session[i]=null;
    saveState();render();return;
  }
  const reds=S.session.filter(v=>v==='P').length;
  const isExtra=i>=(PROFILES[S.profile].n);
  const {entry,empate,gale,empateGale}=calcSessao(isExtra);
  const perda=entry+empate+gale+empateGale;
  if(reds>=1){
    // Segundo red — stop loss
    S.session[i]='P';
    if(!S.lucros)S.lucros={};
    S.lucros[String(i)]=-perda;
    S.banca=Math.max(0,S.banca-perda);
    S.history.unshift({
      date:new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}),
      result:S.banca-(S.bancaSessao||S.banca),banca:S.banca,
      g:S.session.filter(v=>v==='G').length,p:S.session.filter(v=>v==='P').length
    });
    S.session=new Array(12).fill(null);
    S.bancaSessao=null;
    S.lucros={};
    S.empateMult={};
    S.empateTipo={};
    saveState();
    alert('🛑 STOP LOSS ATINGIDO\nSessão encerrada.\nNova banca: R$ '+S.banca.toFixed(2).replace('.',','));
    go('inicio');
    return;
  }
  S.session[i]='P';
  if(!S.lucros)S.lucros={};
  S.lucros[String(i)]=-perda;
  S.banca=Math.max(0,S.banca-perda);
  saveState();render();
}
function encerrar(){
  const hasEntries = S.session.some(v=>v!==null);
  if(!hasEntries){ alert('Nenhuma entrada registrada ainda.'); return; }
  const result = sessaoResult();
  const g=S.session.filter(v=>v==='G').length;
  const p2=S.session.filter(v=>v==='P').length;
  // Marca início do dia se for a primeira sessão
  if(!S.sessoesDoDia)S.sessoesDoDia=[];
  if(S.sessoesDoDia.length===0){ S.bancaInicioDia=S.bancaSessao||S.banca; }
  S.sessoesDoDia.push({ result:result, g:g, p:p2 });
  S.history.unshift({
    date: new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}),
    result: result, banca: S.banca, g: g, p: p2
  });
  S.session=new Array(12).fill(null);
  S.bancaSessao=null;
  S.lucros={};
  S.empateMult={};
  S.empateTipo={};
  saveState();
  alert('✅ Sessão '+S.sessoesDoDia.length+' encerrada!\nResultado: '+fmtS(result)+'\nBanca: '+fmtR(S.banca)+'\n\n'+(S.sessoesDoDia.length>=3?'Você completou 3 sessões. Feche o dia no Resultado a Longo Prazo.':'Faltam '+(3-S.sessoesDoDia.length)+' sessões para fechar o dia.'));
  go('inicio');
}

function fecharDia(){
  if(!S.sessoesDoDia||S.sessoesDoDia.length===0){ alert('Nenhuma sessão registrada hoje.'); return; }
  const lucroD=S.sessoesDoDia.reduce((a,s)=>a+s.result,0);
  const g=S.sessoesDoDia.reduce((a,s)=>a+s.g,0);
  const p=S.sessoesDoDia.reduce((a,s)=>a+s.p,0);
  if(!S.diasReais)S.diasReais=[];
  S.diasReais.push({
    dia: S.diasReais.length+1,
    bancaInicio: S.bancaInicioDia,
    bancaFinal: S.banca,
    lucro: lucroD,
    sessoes: S.sessoesDoDia.length,
    g: g, p: p
  });
  S.sessoesDoDia=[];
  S.bancaInicioDia=null;
  saveState();
  alert('📅 Dia '+S.diasReais.length+' fechado!\nLucro do dia: '+fmtS(lucroD)+'\nBanca: '+fmtR(S.banca));
  render();
}

function editarBancaDia(){
  const novo=prompt('Novo valor da banca (ex: para saque):', Math.round(S.banca));
  if(novo===null)return;
  const v=parseFloat(novo.replace(',','.'));
  if(isNaN(v)||v<0){ alert('Valor inválido'); return; }
  S.banca=v;
  saveState();render();
}

function go(t){
  S.tab=t; saveState();
  document.querySelectorAll('.ntab').forEach(b=>b.classList.remove('active'));
  document.getElementById('nt-'+t).classList.add('active');
  document.getElementById('content').scrollTop=0;
  render();
}

function render(){
  document.getElementById('content').innerHTML =
    S.tab==='inicio'?rInicio():S.tab==='resultados'?rResultados():rSessao();
}

// ── INÍCIO ────────────────────────────────────────────────
function rInicio(){
  const p=PROFILES[S.profile];
  return `
  <div class="card">
    <div class="card-ttl">💰 Banca Atual</div>
    <div class="banca-wrap">
      <label>BANCA</label>
      <input type="number" inputmode="decimal" value="${S.banca}"
        onchange="S.banca=Math.max(10,parseFloat(this.value)||0);saveState();render()">
    </div>
    <div class="banca-hint">Atualizada automaticamente ao encerrar sessão · editável</div>
  </div>

  <div class="card">
    <div class="card-ttl">🎯 Perfil de Gerenciamento</div>
    <div class="pgrid">
      ${PROFILES.map((pr,i)=>`
        <div class="ppill ${S.profile===i?'sel':''}"
          style="background:${pr.color}18;color:${pr.color}"
          onclick="S.profile=${i};saveState();render()">
          <div class="pn">${pr.label}</div>
          <div class="ps">${pr.sub}</div>
          <div class="pd">${pr.obs}</div>
        </div>`).join('')}
    </div>
  </div>

  ${S.history.length ? `
  <div class="card">
    <div class="card-ttl">📋 Histórico de Sessões</div>
    ${S.history.slice(0,8).map(h=>`
      <div class="hist-card">
        <div class="hist-date">${h.date}</div>
        <div class="hist-info">
          <div class="hist-res ${h.result>=0?'pos':'neg'}">${fmtS(h.result)}</div>
          <div class="hist-det">${h.g} ✓  ${h.p} ✗</div>
        </div>
        <div class="hist-banca">
          <div style="font-size:.58rem;color:var(--grey);margin-bottom:.1rem">Banca</div>
          ${fmtR(h.bancaAfter)}
        </div>
      </div>`).join('')}
    ${S.history.length>8?`<div style="font-size:.65rem;color:var(--grey);text-align:center;margin-top:.4rem">+${S.history.length-8} sessões anteriores</div>`:''}
  </div>`:``}

  <div class="card">
    <div class="card-ttl">📋 Como Usar</div>
    <div class="aviso">🛑 Respeite o Stop Loss — ele protege sua banca. Mantenha o gerenciamento em todos os dias.</div>
    ${[
      ['📈 Resultados','Veja a projeção de 30 dias. Toque em cada dia para marcar como concluído.'],
      ['📊 Sessão','Registre cada entrada. Toque ✓ Ganhou ou ✗ Perdeu. Ao encerrar, a banca atualiza automaticamente.'],
      ['✏️ Editar Banca','Você pode editar o valor da banca manualmente no campo acima a qualquer momento.'],
    ].map(([t,d],i,a)=>`
      <div style="margin-bottom:${i<a.length-1?'.7rem':'0'}">
        <div style="font-size:.78rem;font-weight:600;color:var(--gold2);margin-bottom:.28rem">${t}</div>
        <div style="font-size:.74rem;color:var(--grey);line-height:1.6">${d}</div>
        ${i<a.length-1?'<div class="sep"></div>':''}
      </div>`).join('')}
  </div>`;
}

// ── RESULTADOS ────────────────────────────────────────────
function rResultados(){
  let h=`<div class="aviso">🛑 Mantenha o gerenciamento e o Stop Loss em todos os dias sem exceção.</div>`;
  
  // Botões de controle do dia
  const sessoesHoje=(S.sessoesDoDia||[]).length;
  const lucroHoje=(S.sessoesDoDia||[]).reduce((a,s)=>a+s.result,0);
  h+=`<div class="card" style="margin-bottom:.9rem">
    <div class="card-ttl">📅 Dia em Andamento</div>
    <div style="display:flex;justify-content:space-between;padding:.4rem 0;font-size:.8rem">
      <span style="color:var(--grey)">Sessões hoje</span>
      <span style="color:var(--gold2);font-weight:700">${sessoesHoje} / 3</span>
    </div>
    <div style="display:flex;justify-content:space-between;padding:.4rem 0;font-size:.8rem">
      <span style="color:var(--grey)">Resultado parcial</span>
      <span style="font-weight:700;color:${lucroHoje>=0?'#4CAF50':'#e74c3c'}">${fmtS(lucroHoje)}</span>
    </div>
    <button onclick="fecharDia()" style="width:100%;margin-top:.6rem;padding:.7rem;background:${sessoesHoje>0?'rgba(201,168,76,.2)':'rgba(120,120,120,.1)'};border:1px solid ${sessoesHoje>0?'#C9A84C':'rgba(255,255,255,.1)'};border-radius:10px;color:${sessoesHoje>0?'#C9A84C':'#666'};font-weight:700;font-size:.85rem;cursor:pointer">📅 Fechar Dia ${(S.diasReais||[]).length+1}</button>
    <button onclick="editarBancaDia()" style="width:100%;margin-top:.5rem;padding:.6rem;background:transparent;border:1px solid rgba(255,255,255,.1);border-radius:10px;color:#7A9BB5;font-size:.78rem;cursor:pointer">✏️ Editar Banca (Saque/Aporte)</button>
  </div>`;

  // Dias reais fechados
  const dias=S.diasReais||[];
  if(dias.length>0){
    h+=`<div class="wlbl">Dias Realizados</div>`;
    for(let i=dias.length-1;i>=0;i--){
      const d=dias[i];
      h+=`<div class="day-card done">
        <div class="dtop">
          <div class="dnum">DIA ${d.dia}</div>
          <div class="dok" style="font-size:.7rem;color:${d.lucro>=0?'#4CAF50':'#e74c3c'}">${fmtS(d.lucro)}</div>
        </div>
        <div class="dgrid">
          <div class="di"><div>BANCA INÍCIO</div><span>${fmtR(d.bancaInicio)}</span></div>
          <div class="di lucro"><div>BANCA FINAL</div><span>${fmtR(d.bancaFinal)}</span></div>
          <div class="di"><div>SESSÕES</div><span>${d.sessoes}</span></div>
          <div class="di"><div>G / P</div><span>${d.g} / ${d.p}</span></div>
        </div>
      </div>`;
    }
    const lucroTotal=dias.reduce((a,d)=>a+d.lucro,0);
    h+=`<div class="tbar">
      <div class="titem"><div class="tl">Lucro Total</div><div class="tv" style="color:${lucroTotal>=0?'#4CAF50':'#e74c3c'}">${fmtS(lucroTotal)}</div></div>
      <div class="titem"><div class="tl">Banca Atual</div><div class="tv">${fmtR(S.banca)}</div></div>
      <div class="titem"><div class="tl">Dias</div><div class="tv" style="color:var(--gold2)">${dias.length}</div></div>
    </div>`;
  } else {
    h+=`<div style="text-align:center;padding:2rem 1rem;color:var(--grey);font-size:.8rem">Nenhum dia fechado ainda.<br>Encerre suas sessões e feche o dia para ver o histórico aqui.</div>`;
  }
  return h;
}

// ── SESSÃO ────────────────────────────────────────────────
function rSessao(){
  const {entry,empate,gale,empateGale,n}=calcSessao(false);
  const result=sessaoResult();
  const novaBanca=S.banca;
  const g=S.session.filter(v=>v==='G').length;
  const p=S.session.filter(v=>v==='P').length;
  const total=g+p;
  const hasAny=S.session.some(v=>v!==null);

  let h=`
  <div class="vcards">
    <div class="vcard">
      <div class="vl" style="color:var(--gold)">Entrada</div>
      <div class="vv" style="color:var(--gold2)">${fmtR(entry)}</div>
    </div>
    <div class="vcard">
      <div class="vl" style="color:#4CAF50">Empate</div>
      <div class="vv" style="color:#4CAF50">${fmtR(empate)}</div>
    </div>
  </div>`;

  const reds=S.session.filter(v=>v==='P').length;
  const totalSlots=reds>=1?n+3:n;
  for(let i=0;i<totalSlots;i++){
    const v=S.session[i];
    const isExtra=i>=n;
    // Entradas extras após red usam banca atual
    const sessaoI=calcSessao(isExtra);
    const entry=sessaoI.entry,empate=sessaoI.empate,gale=sessaoI.gale,empateGale=sessaoI.empateGale;
    h+=`<div class="ecard ${v==='G'?'won':v==='P'?'lost':''}" ${isExtra?'style="border-color:rgba(231,76,60,.3)"':''}>
      <div class="etop">
        <div class="enum">ENTRADA ${i+1}</div>
        <div class="ebtns">
          <button class="bg ${v==='G'?'sel':''}" onclick="marcarG(${i})">✓ G</button>
          <button class="bp ${v==='P'?'sel':''}" onclick="marcarP(${i})">✗ P</button>
        </div>
      </div>
      <div class="evals">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:.35rem .6rem;font-size:.72rem;padding:.3rem 0;border-top:1px solid rgba(255,255,255,.06);margin-top:.3rem">
          <div><span style="color:var(--grey);font-size:.6rem">Entrada</span><br><span style="color:var(--gold2);font-weight:700">${fmtR(entry)}</span></div>
          <div><span style="color:var(--grey);font-size:.6rem">Gale</span><br><span style="color:var(--orange);font-weight:700">${fmtR(gale)}</span></div>
          <div><span style="color:var(--grey);font-size:.6rem">Empate</span><br><span style="color:#4CAF50;font-weight:700">${fmtR(empate)}</span></div>
          <div><span style="color:var(--grey);font-size:.6rem">Empate Gale</span><br><span style="color:#4CAF50;font-weight:700">${fmtR(empateGale)}</span></div>
        </div>
        ${v==='P'?`<div style="margin-top:.4rem;padding:.5rem .6rem;background:rgba(231,76,60,.08);border:1px solid rgba(231,76,60,.2);border-radius:8px;display:flex;justify-content:space-between;align-items:center">
          <span style="color:#d88880;font-size:.62rem;letter-spacing:.06em;text-transform:uppercase">Perda Total</span>
          <span style="color:#e74c3c;font-weight:700;font-size:.9rem">-${fmtR(entry+empate+gale+empateGale)}</span>
        </div>`:''}
      <div style="margin-top:.5rem;border-top:1px solid rgba(201,168,76,.1);padding-top:.5rem">
        <div style="font-size:.58rem;color:#C9A84C;letter-spacing:.08em;text-transform:uppercase;margin-bottom:.4rem">🎰 Empate</div>
        <div style="display:flex;gap:.3rem;margin-bottom:.35rem;flex-wrap:wrap">
          ${[4,6,10,25,88].map(m=>`<button onclick="selMult(${i},${m})" style="padding:.25rem .5rem;border-radius:6px;border:1px solid ${(S.empateMult||{})[i]==m?'#C9A84C':'rgba(255,255,255,.1)'};background:${(S.empateMult||{})[i]==m?'rgba(201,168,76,.15)':'transparent'};color:${(S.empateMult||{})[i]==m?'#C9A84C':'#7A9BB5'};font-size:.65rem;cursor:pointer">${m}x</button>`).join('')}
        </div>
        <div style="display:flex;gap:.3rem;margin-bottom:.35rem">
          ${['Seco','Entrada','Gale'].map(t=>`<button onclick="selTipo(${i},'${t}')" style="flex:1;padding:.3rem .2rem;border-radius:6px;border:1px solid ${(S.empateTipo||{})[i]==t?'#4CAF50':'rgba(255,255,255,.1)'};background:${(S.empateTipo||{})[i]==t?'rgba(76,175,80,.15)':'transparent'};color:${(S.empateTipo||{})[i]==t?'#4CAF50':'#7A9BB5'};font-size:.6rem;cursor:pointer">${t}</button>`).join('')}
        </div>
        ${(S.empateTipo||{})[i]=='Seco'?`<input id="empval-${i}" type="number" inputmode="decimal" placeholder="Valor jogado no empate" style="width:100%;padding:.4rem .6rem;background:#081220;border:1px solid rgba(201,168,76,.2);border-radius:8px;color:#C9A84C;font-size:.75rem;box-sizing:border-box;margin-bottom:.3rem">`:''}
      </div>
      </div>
    </div>`;
  }

  h+=`
  <div class="rgrid">
    <div class="rcard">
      <div class="rl">Resultado</div>
      <div class="rv ${result>0?'pos':result<0?'neg':'gld'}">${total===0?'—':fmtS(result)}</div>
    </div>
    <div class="rcard">
      <div class="rl">Nova Banca</div>
      <div class="rv gld">${total===0?'—':fmtR(novaBanca)}</div>
    </div>
    <div class="rcard">
      <div class="rl">Aproveitamento</div>
      <div class="rv gld">${total>0?Math.round(g/total*100)+'%':'—'}</div>
    </div>
    <div class="rcard">
      <div class="rl">Entradas</div>
      <div class="rv" style="color:var(--white)">${g>0||p>0?g+' ✓  '+p+' ✗':'—'}</div>
    </div>
  </div>

  <button class="enc-btn ${hasAny?'ready':'empty'}" onclick="${hasAny?'encerrar()':'alert(\"Registre ao menos uma entrada.\")'}">
    ${hasAny?'⬛ Encerrar Sessão e Atualizar Banca':'Registre entradas para encerrar'}
  </button>
  ${hasAny?`<button class="clr-btn" onclick="S.banca=S.bancaSessao||S.banca;S.session=new Array(15).fill(null);S.bancaSessao=null;S.lucros={};S.empateMult={};S.empateTipo={};saveState();render()">Limpar sem salvar</button>`:''}`;

  return h;
}

loadState();
</script>
</body>
</html>
